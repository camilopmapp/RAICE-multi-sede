<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RAICE — Sin conexión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'DM Sans', sans-serif;
      background: #0f1f3d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 72px; height: 72px;
      background: #14b8b0;
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 900;
      color: #0f1f3d;
      margin: 0 auto 1.5rem;
      font-family: serif;
    }
    h1 { font-size: 1.3rem; margin-bottom: .6rem; }
    p  { font-size: .88rem; opacity: .65; line-height: 1.6; margin-bottom: 1.75rem; }
    button {
      background: #14b8b0;
      color: #0f1f3d;
      border: none;
      border-radius: 14px;
      padding: .8rem 2rem;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: .85; }
    .status {
      margin-top: 1rem;
      font-size: .75rem;
      opacity: .45;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">R</div>
    <h1>Sin conexión</h1>
    <p>Verifica tu conexión a internet e intenta de nuevo.<br>Tus listas guardadas localmente se sincronizarán automáticamente al reconectarte.</p>
    <button onclick="retry()">🔄 Reintentar</button>
    <div class="status" id="status">Verificando conexión…</div>
  </div>
  <script>
    function retry() {
      window.location.href = '/login';
    }
    // Auto-retry when back online
    window.addEventListener('online', () => {
      document.getElementById('status').textContent = '✅ Conexión restaurada — redirigiendo…';
      setTimeout(() => window.location.href = '/login', 1000);
    });
    document.getElementById('status').textContent =
      navigator.onLine ? 'Conectado — recarga la página' : 'Sin conexión a internet';
  </script>
</body>
</html>
