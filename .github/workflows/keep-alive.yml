name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */5 * *'  # Cada 5 días a las 12:00 UTC
  workflow_dispatch:         # Permite ejecutarlo manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping a Supabase via /api/ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://raiceladh.vercel.app/api/ping)
          echo "Respuesta del servidor: $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "⚠️ El ping falló con status $STATUS"
            exit 1
          fi
          echo "✅ Supabase sigue activo"
