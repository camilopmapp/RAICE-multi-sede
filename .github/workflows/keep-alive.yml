name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping RAICE API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://raiceladh.vercel.app/api/health)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Ping exitoso"
          else
            echo "Ping fallo con status $STATUS"
            exit 1
          fi
